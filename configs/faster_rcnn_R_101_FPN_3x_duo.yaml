_BASE_: "./Base-RCNN-FPN.yaml"
MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  ROI_HEADS:
    NUM_CLASSES: 4  # DUO has 4 classes: holothurian, echinus, scallop, starfish
DATASETS:
  TRAIN: ("duo_train",)
  TEST: ("duo_test",)
INPUT:
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
SOLVER:
  STEPS: (20000, 25000)
  MAX_ITER: 30000
  IMS_PER_BATCH: 4
  BASE_LR: 0.0025
