_BASE_: "./Base-RCNN-FPN.yaml"
MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  ROI_HEADS:
    NUM_CLASSES: 10  # RUOD has 10 categories
DATASETS:
  TRAIN: ("ruod_train_sparse_80_10",)  # change to other RUOD splits as needed
  TEST: ("ruod_test",)
INPUT:
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
SOLVER:
  STEPS: (20000, 25000)
  MAX_ITER: 30000
  IMS_PER_BATCH: 4
  BASE_LR: 0.0025

